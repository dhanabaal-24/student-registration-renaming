<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Successful — Ma Foi Careers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f0f4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 24px 16px;
            overflow-x: hidden;
        }

        /* ── Confetti canvas ── */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Main card ── */
        .success-card {
            position: relative;
            z-index: 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(14, 75, 255, 0.15);
            padding: 48px 40px 40px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            animation: cardSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Animated tick ── */
        .tick-wrap {
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            position: relative;
        }

        .tick-circle-bg {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0E4BFF, #2FE6A6);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.4s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .tick-svg { width: 44px; height: 44px; overflow: visible; }

        .tick-path {
            stroke: white;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: drawTick 0.4s 0.7s ease forwards;
        }

        @keyframes drawTick { to { stroke-dashoffset: 0; } }

        .tick-pulse {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px solid rgba(14, 75, 255, 0.3);
            animation: pulseRing 1s 1s ease-out both;
        }

        @keyframes pulseRing {
            from { transform: scale(0.8); opacity: 1; }
            to   { transform: scale(1.4); opacity: 0; }
        }

        /* ── Text ── */
        .success-title {
            font-size: 26px;
            font-weight: 800;
            color: #0d1117;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            animation: fadeUp 0.4s 0.8s ease both;
        }

        .success-sub {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.5;
            animation: fadeUp 0.4s 0.9s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
            margin: 28px 0;
            animation: fadeUp 0.4s 1s ease both;
        }

        /* ── ID badge ── */
        .id-section { animation: fadeUp 0.4s 1s ease both; }

        .id-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .id-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #0E4BFF 0%, #2563eb 100%);
            color: white;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 0.12em;
            padding: 18px 36px;
            border-radius: 16px;
            cursor: pointer;
            position: relative;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 8px 24px rgba(14, 75, 255, 0.35);
            user-select: none;
            width: 100%;
            border: none;
        }

        .id-badge:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(14, 75, 255, 0.4); }
        .id-badge:active { transform: translateY(0); }
        .id-badge .copy-icon { opacity: 0.7; flex-shrink: 0; }

        .copy-tooltip {
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .copy-tooltip.show { opacity: 1; }
        .copy-tooltip::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1f2937;
        }

        .id-hint { font-size: 12px; color: #9ca3af; margin-top: 10px; }

        /* ── What's next ── */
        .next-box {
            background: #f8faff;
            border: 1px solid #e0e7ff;
            border-radius: 14px;
            padding: 18px 20px;
            text-align: left;
            margin-top: 24px;
            animation: fadeUp 0.4s 1.1s ease both;
        }

        .next-box h3 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .next-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13.5px;
            color: #374151;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .next-item:last-child { margin-bottom: 0; }

        .next-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0E4BFF, #2FE6A6);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .next-dot svg { width: 10px; height: 10px; }

        /* ── 3 Action buttons ── */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 28px;
            animation: fadeUp 0.4s 1.2s ease both;
        }

        /* Primary — Download PDF */
        .btn-pdf {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #0E4BFF, #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(14, 75, 255, 0.3);
            width: 100%;
            font-family: inherit;
        }

        .btn-pdf:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14, 75, 255, 0.4); }
        .btn-pdf:active { transform: translateY(0); }

        .btn-pdf.loading {
            opacity: 0.8;
            cursor: wait;
        }

        /* Secondary row */
        .actions-row {
            display: flex;
            gap: 10px;
        }

        .btn-outline {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: white;
            color: #374151;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-outline:hover {
            border-color: #0E4BFF;
            color: #0E4BFF;
            background: #f0f4ff;
        }

        /* ── Error state ── */
        .error-state { text-align: center; padding: 48px 40px; }
        .error-icon { font-size: 48px; margin-bottom: 16px; }
        .error-title { font-size: 20px; font-weight: 700; color: #dc2626; margin-bottom: 8px; }
        .error-msg { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0E4BFF;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
        }

        @media (max-width: 480px) {
            .success-card { padding: 36px 20px 28px; }
            .id-badge { font-size: 22px; padding: 16px 20px; }
            .actions-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="success-card" id="card"></div>

<script type="module">
'use strict';

import { Confetti } from './js/confetti.js';
import { supabase } from './js/supabase.js';

// ── Read data: URL params → sessionStorage fallback ──────────
const params  = new URLSearchParams(window.location.search);
let maFoiId  = params.get('id')?.trim().toUpperCase() || null;
let fullName = params.get('name')?.trim() || null;
let regType  = params.get('type') || 'new';

if (!maFoiId) {
    try {
        const stored = sessionStorage.getItem('mafoi_reg');
        if (stored) {
            const obj = JSON.parse(stored);
            maFoiId  = obj.maFoiId  || null;
            fullName = obj.fullName || null;
            regType  = obj.type    || 'new';
        }
    } catch (_) {}
}

const card = document.getElementById('card');

// ── ERROR STATE ───────────────────────────────────────────────
if (!maFoiId) {
    card.innerHTML = `
        <div class="error-state">
            <div class="error-icon">⚠️</div>
            <div class="error-title">Registration ID Not Found</div>
            <div class="error-msg">
                Your registration may still have been saved.<br>
                Please check your email or contact Ma Foi support.
            </div>
            <a href="index.html" class="btn-back">← Back to Registration</a>
        </div>`;
    try { sessionStorage.removeItem('mafoi_reg'); } catch(_) {}

// ── SUCCESS STATE ─────────────────────────────────────────────
} else {
    const heading = regType === 'update' ? 'Registration Updated!' : 'Successfully Registered!';
    const subtext = regType === 'update'
        ? 'Your Ma Foi registration has been updated successfully.'
        : 'Welcome to Ma Foi Careers. Your registration is confirmed.';

    card.innerHTML = `
        <div class="tick-wrap">
            <div class="tick-circle-bg">
                <svg class="tick-svg" viewBox="0 0 44 44">
                    <path class="tick-path" d="M10 22 L19 31 L34 14"/>
                </svg>
            </div>
            <div class="tick-pulse"></div>
        </div>

        <h1 class="success-title">${heading}</h1>
        <p class="success-sub">${subtext}</p>

        <div class="divider"></div>

        <div class="id-section">
            <p class="id-label">Your Ma Foi ID</p>
            <button class="id-badge" id="id-badge" type="button" aria-label="Copy Ma Foi ID ${maFoiId}">
                <span>${maFoiId}</span>
                <svg class="copy-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                <span class="copy-tooltip" id="copy-tooltip">Copied!</span>
            </button>
            <p class="id-hint">Tap the ID to copy it · Keep it safe to edit your registration later</p>
        </div>

        <div class="next-box">
            <h3>What happens next?</h3>
            <div class="next-item">
                <div class="next-dot"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
                <span>A Ma Foi representative will contact you within 2–3 working days.</span>
            </div>
            <div class="next-item">
                <div class="next-dot"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
                <span>Save your Ma Foi ID <strong>${maFoiId}</strong> for all future correspondence.</span>
            </div>
            <div class="next-item">
                <div class="next-dot"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
                <span>You can edit your registration anytime using your ID and registered phone number.</span>
            </div>
        </div>

        <div class="actions">
            <!-- Primary: Download PDF -->
            <button class="btn-pdf" id="btn-pdf" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download Registration PDF
            </button>

            <!-- Secondary row -->
            <div class="actions-row">
                <a href="edit.html" class="btn-outline">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    Edit Registration
                </a>
                <a href="index.html" class="btn-outline">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Return to Home
                </a>
            </div>
        </div>
    `;

    // ── Copy Ma Foi ID ────────────────────────────────────────
    const badge   = document.getElementById('id-badge');
    const tooltip = document.getElementById('copy-tooltip');

    async function copyId() {
        try { await navigator.clipboard.writeText(maFoiId); }
        catch {
            const t = document.createElement('textarea');
            t.value = maFoiId;
            t.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            t.remove();
        }
        tooltip.classList.add('show');
        setTimeout(() => tooltip.classList.remove('show'), 2000);
    }

    badge.addEventListener('click', copyId);
    badge.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copyId(); }
    });

    // ── Download PDF ──────────────────────────────────────────
    document.getElementById('btn-pdf').addEventListener('click', async () => {
        const btn = document.getElementById('btn-pdf');
        btn.classList.add('loading');
        btn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 0.8s linear infinite">
                <path d="M21 12a9 9 0 11-6.219-8.56"/>
            </svg>
            Generating PDF…`;

        try {
            // Fetch full student record from Supabase
            let student = null;
            let documents = [];

            try {
                const { data: s } = await supabase
                    .from('students').select('*').eq('ma_foi_id', maFoiId).single();
                student = s;

                const { data: d } = await supabase
                    .from('documents').select('*').eq('ma_foi_id', maFoiId);
                documents = d || [];
            } catch (fetchErr) {
                console.warn('Could not fetch full record, using partial data:', fetchErr);
            }

            generateAndDownloadPDF(maFoiId, fullName, student, documents);

        } catch (err) {
            console.error('PDF generation error:', err);
            alert('Could not generate PDF. Please try again.');
        } finally {
            btn.classList.remove('loading');
            btn.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download Registration PDF`;
        }
    });

    // ── Confetti ──────────────────────────────────────────────
    try {
        const canvas   = document.getElementById('confetti-canvas');
        const confetti = new Confetti(canvas);
        confetti.launch();
        setTimeout(() => confetti.destroy(), 5000);
    } catch (e) {
        console.warn('Confetti failed:', e);
    }

    try { sessionStorage.removeItem('mafoi_reg'); } catch(_) {}
}

// ─────────────────────────────────────────────────────────────
// PDF GENERATION
// Opens a print-ready window and triggers browser Save as PDF
// ─────────────────────────────────────────────────────────────

function generateAndDownloadPDF(maFoiId, fullName, student, documents) {
    const today = new Date().toLocaleDateString('en-IN', {
        day: '2-digit', month: 'long', year: 'numeric'
    });

    const row = (label, value) =>
        value ? `<tr><td class="lbl">${label}</td><td class="val">${esc(String(value))}</td></tr>` : '';

    const fatherAadhaar = student?.father_aadhaar_masked
        ? student.father_aadhaar_masked.replace(':', 'XXX XXX')
        : null;

    const maskAadhaar = (n) =>
        (n && n.length === 12) ? 'XXXX XXXX ' + n.slice(8) : (n || '—');

    const formatDate = (iso) => {
        if (!iso) return '—';
        const d = new Date(iso);
        return isNaN(d) ? iso : d.toLocaleDateString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric' });
    };

    const DOC_TYPES = [
        { key: '10th_marksheet',     label: '10th Marksheet' },
        { key: '12th_marksheet',     label: '12th Marksheet' },
        { key: 'degree_certificate', label: '6th Sem Marksheet / Degree Certificate' },
        { key: 'aadhaar_card',       label: 'Aadhaar Card' },
        { key: 'ration_income',      label: 'Ration Card / Income Certificate' },
        { key: 'signature',          label: 'Signature' },
        { key: 'passport_photo',     label: 'Passport Size Photo' },
    ];

    const docRows = DOC_TYPES.map(dt => {
        const found = documents.find(d => d.doc_type === dt.key);
        return `<tr>
            <td class="lbl">${dt.label}</td>
            <td class="val ${found ? 'ok' : 'miss'}">${found ? '✓ Uploaded' : '— Not uploaded'}</td>
        </tr>`;
    }).join('');

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Ma Foi Registration — ${maFoiId}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    color: #111827;
    background: white;
    padding: 32px 36px;
    max-width: 780px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 18px;
    border-bottom: 3px solid #0E4BFF;
    margin-bottom: 24px;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    color: #0E4BFF;
    letter-spacing: -0.5px;
  }

  .logo span { color: #2FE6A6; }

  .meta {
    text-align: right;
    font-size: 11.5px;
    color: #6b7280;

  }

  .meta strong {
    display: block;

    font-weight: 700;
  }

  /* Title */
  .doc-title {

    margin-bottom: 20px;
  }

  /* ID badge */
  .id-block {
    background: linear-gradient(135deg, #0E4BFF 0%, #2563eb 100%);
    color: white;
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .id-block .id-label { font-size: 11px; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.1em; }
  .id-block .id-val   { font-size: 28px; font-weight: 900; letter-spacing: 0.1em; margin-top: 2px; }
  .id-block .id-right { text-align: right; font-size: 12px; opacity: 0.85; line-height: 1.6; }

  /* Sections */
  .section { margin-bottom: 20px; page-break-inside: avoid; }

  .lbl {

  /* Signature block */
  .sig-block {
    display: grid;

  }

    color: #6b7280;
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    padding-top: 14px;

    display: flex;

  }

  /* Print */
  @media print {
    body { padding: 20px 24px; }
    .no-print { display: none !important; }
    a { text-decoration: none; color: inherit; }
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<body>

    // Open in new window — user clicks "Save as PDF" in print dialog
    const win = window.open('', '_blank', 'width=820,height=1000,scrollbars=yes');
    if (!win) {
        // Popup blocked — download as HTML file instead
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `MaFoi_Registration_${maFoiId}.html`;
        a.click();
        URL.revokeObjectURL(url);
        return;
    }

    win.document.open();
    win.document.write(html);
    win.document.close();
}

function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
}
</script>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
