<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration Successful — Ma Foi Careers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/theme.css"/>
  <style>
    /* ── Page layout ─────────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    /* ── Confetti ────────────────────────────────────────────── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Success card ────────────────────────────────────────── */
    .success-card {
      position: relative;
      z-index: 1;
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(30, 58, 95, 0.12);
      padding: 48px 40px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(28px) scale(0.97);
      transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .success-card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ── Animated tick icon ──────────────────────────────────── */
    .tick-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      position: relative;
    }

    .tick-bg {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.4);
      transition: opacity 0.35s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.35s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .success-card.visible .tick-bg {
      opacity: 1;
      transform: scale(1);
    }

    .tick-svg {
      width: 40px;
      height: 40px;
      overflow: visible;
    }

    .tick-path {
      stroke: white;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 55;
      stroke-dashoffset: 55;
      transition: stroke-dashoffset 0.38s 0.52s ease;
    }

    .success-card.visible .tick-path {
      stroke-dashoffset: 0;
    }

    /* Ripple ring */
    .tick-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2.5px solid rgba(37, 99, 235, 0.35);
      opacity: 0;
      transform: scale(0.85);
    }

    .success-card.visible .tick-ring {
      animation: ripple 0.9s 0.9s ease-out forwards;
    }

    @keyframes ripple {
      0%   { opacity: 1; transform: scale(0.85); }
      100% { opacity: 0; transform: scale(1.45); }
    }

    /* ── Text elements — staggered fade-up ───────────────────── */
    .s-title,
    .s-sub,
    .s-divider,
    .id-section,
    .next-box,
    .action-group {
      opacity: 0;
      transform: translateY(14px);
    }

    .success-card.visible .s-title     { animation: fadeUp 0.38s 0.70s ease forwards; }
    .success-card.visible .s-sub       { animation: fadeUp 0.38s 0.82s ease forwards; }
    .success-card.visible .s-divider   { animation: fadeUp 0.38s 0.90s ease forwards; }
    .success-card.visible .id-section  { animation: fadeUp 0.38s 0.98s ease forwards; }
    .success-card.visible .next-box    { animation: fadeUp 0.38s 1.08s ease forwards; }
    .success-card.visible .action-group{ animation: fadeUp 0.38s 1.18s ease forwards; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ──────────────────────────────────────────── */
    .s-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }

    .s-sub {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .s-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── Ma Foi ID badge ─────────────────────────────────────── */
    .id-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .id-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: white;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.1em;
      padding: 18px 24px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 20px rgba(37,99,235,0.28);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
      user-select: none;
    }

    .id-badge:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,99,235,0.36); }
    .id-badge:active { transform: translateY(0); }

    .copy-chip {
      background: rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .copy-tooltip {
      position: absolute;
      top: -36px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1e293b;
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
    }

    .copy-tooltip.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .copy-tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1e293b;
    }

    .id-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── What's next box ─────────────────────────────────────── */
    .next-box {
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 12px;
      padding: 16px 18px;
      text-align: left;
      margin-top: 20px;
    }

    .next-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .next-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .next-item:last-child { margin-bottom: 0; }

    .next-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Action buttons ──────────────────────────────────────── */
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(37,99,235,0.25);
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .btn-download:hover  { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(37,99,235,0.35); transform: translateY(-1px); }
    .btn-download:active { transform: translateY(0); }
    .btn-download:disabled { opacity: 0.7; cursor: wait; }

    .btn-row-2 {
      display: flex;
      gap: 10px;
    }

    .btn-sec {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px;
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-secondary);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .btn-sec:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #f0f4ff;
    }

    /* ── Spinner for PDF button ──────────────────────────────── */
    .spin {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spinAnim 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spinAnim { to { transform: rotate(360deg); } }

    /* ── Error state ─────────────────────────────────────────── */
    .err-state {
      text-align: center;
      padding: 20px;
    }

    .err-icon {
      width: 64px; height: 64px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      color: var(--danger);
    }

    .err-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .err-msg   { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .page-body     { padding: 20px 16px 40px; align-items: flex-start; padding-top: 32px; }
      .success-card  { padding: 28px 18px 24px; border-radius: 16px; }
      .tick-wrap     { width: 68px; height: 68px; margin-bottom: 18px; }
      .tick-bg       { width: 68px; height: 68px; }
      .tick-svg      { width: 34px; height: 34px; }
      .s-title       { font-size: 20px; }
      .s-sub         { font-size: 13px; }
      .id-badge      { font-size: 20px; padding: 14px 14px; border-radius: 12px; }
      .copy-chip     { font-size: 10px; padding: 3px 6px; }
      .id-hint       { font-size: 11px; }
      .next-box      { padding: 14px 14px; }
      .next-item     { font-size: 12.5px; gap: 8px; }
      .action-group  { margin-top: 18px; gap: 8px; }
      .btn-download  { padding: 12px 16px; font-size: 13.5px; }
      .btn-row-2     { flex-direction: column; gap: 8px; }
      .btn-sec       { padding: 11px 14px; font-size: 13px; }
      .err-state     { padding: 16px; }
    }

    @media (min-width: 481px) and (max-width: 640px) {
      .success-card  { padding: 36px 28px 32px; max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- Header — matches portal exactly -->
<header class="portal-header">
  <a href="index.html" class="portal-logo">
    <div class="portal-logo__icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div>
      <span class="portal-logo__name">Ma Foi</span>
      <span class="portal-logo__sub">Student Registration</span>
    </div>
  </a>
  <div class="portal-header__badge" id="header-badge" style="display:none"></div>
</header>

<!-- Confetti -->
<canvas id="confetti-canvas"></canvas>

<!-- Page body -->
<div class="page-body">
  <div class="success-card" id="card"></div>
</div>

<script type="module">
'use strict';

import { Confetti } from './js/confetti.js';
import { supabase } from './js/supabase.js';
import { VIEW_STUDENT_FULL, TABLE_REGISTRATION_DOCS } from './js/config.js';

// ── Read registration data ─────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
let maFoiId  = params.get('id')?.trim().toUpperCase() || null;
let fullName = params.get('name')?.trim() || null;
let regType  = params.get('type') || 'new';

if (!maFoiId && regType !== 'bajaj' && regType !== 'bajaj-update') {
  try {
    const s = JSON.parse(sessionStorage.getItem('mafoi_reg') || 'null');
    if (s) { maFoiId = s.maFoiId; fullName = s.fullName; regType = s.type || 'new'; }
  } catch(_) {}
}

// Bajaj registration/update — read from sessionStorage if params incomplete
if (regType === 'bajaj' || regType === 'bajaj-update' ||
    params.get('type') === 'bajaj' || params.get('type') === 'bajaj-update') {
  try {
    const s = JSON.parse(sessionStorage.getItem('mafoi_reg') || 'null');
    if (s?.type === 'bajaj' || s?.type === 'bajaj-update') {
      fullName = fullName || s.fullName;
      regType  = s.type;
    }
  } catch(_) {}
}

const card = document.getElementById('card');

// ════════════════════════════════════════════════════
// ERROR STATE
// ════════════════════════════════════════════════════
// ── BAJAJ SUCCESS / UPDATE — no Ma Foi ID shown ──────────────
if (regType === 'bajaj' || regType === 'bajaj-update') {
  const isBajajUpdate = regType === 'bajaj-update';
  const displayName   = fullName || 'Student';
  const bHeading       = isBajajUpdate ? 'Registration Updated!' : 'Registration Successful!';
  const bSub           = isBajajUpdate
    ? `Thank you, <strong>${esc(displayName)}</strong>.<br>Your Bajaj FinServ registration has been updated successfully.`
    : `Thank you, <strong>${esc(displayName)}</strong>.<br>Your Bajaj FinServ registration has been submitted successfully.<br>Our team will contact you shortly.`;

  document.getElementById('header-badge').textContent = 'Bajaj FinServ';
  document.getElementById('header-badge').style.display = '';
  card.innerHTML = `
    <!-- Tick icon -->
    <div class="tick-wrap">
      <div class="tick-bg" style="background:linear-gradient(135deg,#92400e,#b45309)">
        <svg class="tick-svg" viewBox="0 0 40 40">
          <path class="tick-path" d="M8 20 L17 29 L32 13"/>
        </svg>
      </div>
      <div class="tick-ring" style="border-color:rgba(180,83,9,.35)"></div>
    </div>

    <h1 class="s-title">${bHeading}</h1>
    <p class="s-sub">
      ${bSub}
    </p>

    <div class="s-divider"></div>

    <!-- What happens next -->
    <div class="next-box">
      <div class="next-title">What happens next?</div>
      <div class="next-item">
        <div class="next-icon" style="background:#b45309">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>A Ma Foi representative will contact you within 2–3 working days.</span>
      </div>
      <div class="next-item">
        <div class="next-icon" style="background:#b45309">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Keep your Aadhaar card and documents ready for verification.</span>
      </div>
      <div class="next-item">
        <div class="next-icon" style="background:#b45309">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>You will be notified once you are assigned to a batch.</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-group">
      <div class="btn-row-2">
        <a href="index.html" class="btn-sec">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Return to Home
        </a>
      </div>
    </div>
  `;
  triggerCard();
  try { sessionStorage.removeItem('mafoi_reg'); } catch(_) {}

// ── ERROR — missing Ma Foi ID for Nasscom ─────────────────────
} else if (!maFoiId) {
  card.innerHTML = `
    <div class="err-state">
      <div class="err-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div class="err-title">Registration ID Not Found</div>
      <div class="err-msg">
        Your registration may still have been saved.<br>
        Please check your Supabase table or contact Ma Foi support.
      </div>
      <a href="index.html" class="btn-sec" style="display:inline-flex;max-width:220px;margin:0 auto">
        ← Back to Home
      </a>
    </div>`;
  triggerCard();
  try { sessionStorage.removeItem('mafoi_reg'); } catch(_) {}

// ════════════════════════════════════════════════════
// NASSCOM SUCCESS STATE — shows Ma Foi ID
// ════════════════════════════════════════════════════
} else {
  const isUpdate = regType === 'update';
  const heading  = isUpdate ? 'Registration Updated!' : 'Successfully Registered!';
  const subtext  = isUpdate
    ? 'Your Ma Foi registration has been updated. All changes are saved.'
    : 'Welcome to Ma Foi Careers. Your registration is confirmed.';

  // Update header badge
  const hbadge = document.getElementById('header-badge');
  hbadge.textContent = maFoiId;
  hbadge.style.display = '';

  card.innerHTML = `
    <!-- Tick icon -->
    <div class="tick-wrap">
      <div class="tick-bg">
        <svg class="tick-svg" viewBox="0 0 40 40">
          <path class="tick-path" d="M8 20 L17 29 L32 13"/>
        </svg>
      </div>
      <div class="tick-ring"></div>
    </div>

    <!-- Heading -->
    <h1 class="s-title">${heading}</h1>
    <p class="s-sub">${subtext}</p>

    <div class="s-divider"></div>

    <!-- ID badge -->
    <div class="id-section">
      <p class="id-label">Your Ma Foi ID</p>
      <button class="id-badge" id="id-badge" type="button" aria-label="Copy Ma Foi ID ${maFoiId}">
        <span id="id-text">${maFoiId}</span>
        <span class="copy-chip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </span>
        <span class="copy-tooltip" id="copy-tooltip">✓ Copied!</span>
      </button>
      <p class="id-hint">Tap to copy · Keep this ID to edit your registration later</p>
    </div>

    <!-- What's next -->
    <div class="next-box">
      <div class="next-title">What happens next?</div>
      <div class="next-item">
        <div class="next-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>A Ma Foi representative will contact you within 2–3 working days.</span>
      </div>
      <div class="next-item">
        <div class="next-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Save your Ma Foi ID <strong>${maFoiId}</strong> for all future correspondence.</span>
      </div>
      <div class="next-item">
        <div class="next-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>You can edit your registration anytime using your ID and registered phone number.</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-group">
      <button class="btn-download" id="btn-pdf" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Registration PDF
      </button>
      <div class="btn-row-2">
        <a href="edit.html" class="btn-sec">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit Registration
        </a>
        <a href="index.html" class="btn-sec">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Return to Home
        </a>
      </div>
    </div>
  `;

  // ── Copy ID ─────────────────────────────────────────────────
  const badge   = document.getElementById('id-badge');
  const tooltip = document.getElementById('copy-tooltip');

  async function copyId() {
    try { await navigator.clipboard.writeText(maFoiId); }
    catch {
      const t = Object.assign(document.createElement('textarea'), { value: maFoiId });
      t.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove();
    }
    tooltip.classList.add('show');
    setTimeout(() => tooltip.classList.remove('show'), 2000);
  }

  badge.addEventListener('click', copyId);
  badge.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); copyId(); }});

  // ── Download PDF ─────────────────────────────────────────────
  document.getElementById('btn-pdf').addEventListener('click', async () => {
    const btn = document.getElementById('btn-pdf');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Generating PDF…';
    try {
      let student = null, documents = [];
      try {
        const { data: s, error: sErr } = await supabase
          .from(VIEW_STUDENT_FULL)
          .select('*')
          .eq('ma_foi_id', maFoiId)
          .single();
        if (sErr) console.error('[PDF] Could not load student:', sErr);
        student = s;

        if (student?.id) {
          const { data: d, error: dErr } = await supabase
            .from(TABLE_REGISTRATION_DOCS)
            .select('*')
            .eq('student_id', student.id);
          if (dErr) console.error('[PDF] Could not load documents:', dErr);
          documents = d || [];
        }
      } catch(e) { console.error('[PDF] Data fetch failed:', e); }
      generatePDF(maFoiId, fullName, student, documents);
    } catch(e) {
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Registration PDF`;
    }
  });

  // ── Confetti (only on new registration) ──────────────────────
  if (!isUpdate) {
    try {
      const confetti = new Confetti(document.getElementById('confetti-canvas'));
      confetti.launch();
      setTimeout(() => confetti.destroy(), 5000);
    } catch(e) { console.warn('Confetti:', e); }
  }

  try { sessionStorage.removeItem('mafoi_reg'); } catch(_) {}
}

// ── Trigger card entrance animation ───────────────────────────
function triggerCard() {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('card').classList.add('visible');
  }));
}

triggerCard();

// ════════════════════════════════════════════════════
// PDF GENERATOR
// ════════════════════════════════════════════════════
function generatePDF(maFoiId, fullName, student, documents) {
  const today = new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });
  const fmt   = iso => { if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?iso:d.toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'}); };
  const mask  = n => (n && n.length===12) ? 'XXXX XXXX '+n.slice(8) : (n||'—');
  const row   = (k,v) => v!=null&&v!=='' ? `<tr><td class="lbl">${k}</td><td class="val">${esc(String(v))}</td></tr>` : '';
  const fAadh = student?.father_aadhaar_masked?.replace(':','XXX XXX') || null;

  const DOC_TYPES = [
    {key:'10th_marksheet',label:'10th Marksheet'},
    {key:'12th_marksheet',label:'12th Marksheet'},
    {key:'degree_certificate',label:'6th Sem Marksheet / Degree Certificate'},
    {key:'aadhaar_card',label:'Aadhaar Card'},
    {key:'ews_certificate',label:'EWS Certificate'},
    {key:'signature',label:'Signature'},
    {key:'passport_photo',label:'Passport Size Photo'},
  ];

  const docRows = DOC_TYPES.map(dt => {
    const found = documents.find(d => d.doc_type === dt.key);
    return `<tr><td class="lbl">${dt.label}</td><td class="val ${found?'ok':'miss'}">${found?'✓ Uploaded':'— Not uploaded'}</td></tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<title>Ma Foi Registration — ${esc(maFoiId)}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;font-size:13px;color:#111827;background:#fff;padding:32px 36px;max-width:780px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:3px solid #1e3a5f;margin-bottom:22px}
.logo{font-size:20px;font-weight:800;color:#1e3a5f;letter-spacing:-.5px}.logo span{color:#2563eb}
.meta{text-align:right;font-size:11.5px;color:#6b7280;line-height:1.6}.meta strong{display:block;font-size:13px;color:#111827;font-weight:700}
.doc-title{text-align:center;font-size:16px;font-weight:800;color:#1e3a5f;letter-spacing:.02em;margin-bottom:18px}
.id-block{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border-radius:10px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.id-lbl{font-size:10px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.1em}
.id-val{font-size:26px;font-weight:900;letter-spacing:.1em;margin-top:2px}
.id-right{text-align:right;font-size:12px;opacity:.85;line-height:1.6}
.section{margin-bottom:18px;page-break-inside:avoid}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#1e3a5f;background:#eff6ff;padding:5px 10px;border-left:3px solid #2563eb;border-radius:0 4px 4px 0;margin-bottom:7px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
.lbl{width:42%;padding:7px 10px;color:#6b7280;font-weight:600;background:#f9fafb;border-bottom:1px solid #f3f4f6}
.val{padding:7px 10px;color:#111827;border-bottom:1px solid #f3f4f6}
.ok{color:#16a34a;font-weight:700}.miss{color:#9ca3af}
.sigs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:36px;page-break-inside:avoid}
.sig{border-top:1px solid #374151;padding-top:6px;font-size:11px;color:#6b7280}
.footer{margin-top:24px;padding-top:12px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;font-size:10.5px;color:#9ca3af}
.no-print{text-align:right;margin-bottom:18px}
@media print{.no-print{display:none!important}}
</style></head><body>
<div class="no-print">
  <button onclick="window.print()" style="background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">🖨️ Save as PDF / Print</button>
</div>
<div class="hdr">
  <div class="logo">Ma Foi<span>.</span>Careers</div>
  <div class="meta"><strong>Registration Acknowledgement</strong>Date: ${today}<br>Program: ${esc(student?.program_name||'—')} · ${esc(student?.location_name||'—')}</div>
</div>
<div class="doc-title">REGISTRATION ACKNOWLEDGEMENT CERTIFICATE</div>
<div class="id-block">
  <div><div class="id-lbl">Ma Foi ID</div><div class="id-val">${esc(maFoiId)}</div></div>
  <div class="id-right">Batch: ${esc(student?.batch_code||'Not assigned')}<br>${esc(student?.program_name||'')} Program<br>${esc(student?.location_name||'')} Centre</div>
</div>
<div class="section"><div class="sec-title">Personal Information</div><table>
  ${row('Full Name', fullName||(student?`${student.first_name} ${student.last_name}`:null))}
  ${row('Email Address', student?.email)}${row('Phone Number', student?.phone)}
  ${row('Gender', student?.gender)}${row('Date of Birth', fmt(student?.date_of_birth))}
  ${row('Aadhaar Number', mask(student?.aadhaar_number))}${row('Address', student?.address)}
  ${row('Educational Qualification', student?.educational_qualification)}${row('Graduation Year', student?.graduation_year)}
</table></div>
<div class="section"><div class="sec-title">Program Enrollment</div><table>
  ${row('Project', student?.project_name)}${row('Program', student?.program_name)}${row('Centre Location', student?.location_name)}${row('Batch', student?.batch_code || 'Not yet assigned')}
</table></div>
<div class="section"><div class="sec-title">Family Background</div><table>
  ${row("Father's Name", student?.father_name)}${row("Mother's Name", student?.mother_name)}
  ${row("Father's Occupation", student?.father_occupation)}${row('Parent Contact', student?.parent_contact)}
  ${row('Total Family Members', student?.total_family_members)}${row('Annual Family Income', student?.annual_family_income)}
  ${fAadh?row("Father's Aadhaar (Partial)",fAadh):''}
</table></div>
<div class="section"><div class="sec-title">Uploaded Documents</div><table>
  <tr><td class="lbl" style="font-weight:700;color:#374151">Document</td><td class="val" style="font-weight:700;color:#374151">Status</td></tr>
  ${docRows}
</table></div>
<div class="sigs">
  <div><div class="sig">Student Signature</div></div>
  <div><div class="sig">Centre Coordinator</div></div>
  <div><div class="sig">Authorized Signatory</div></div>
</div>
<div class="footer">
  <span>Ma Foi Management Consultants Ltd. / CIEL HR Services</span>
  <span>System generated · ${esc(maFoiId)} · ${new Date().toISOString().split('T')[0]}</span>
</div>
<script>window.addEventListener('load',()=>setTimeout(()=>window.print(),600));<\/script>
</body></html>`;

  const win = window.open('', '_blank', 'width=820,height=1000,scrollbars=yes');
  if (!win) {
    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    Object.assign(document.createElement('a'), {href:url, download:`MaFoi_Registration_${maFoiId}.html`}).click();
    URL.revokeObjectURL(url);
    return;
  }
  win.document.open(); win.document.write(html); win.document.close();
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
}
</script>
