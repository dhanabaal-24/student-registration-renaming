<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration Successful — Ma Foi Careers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/theme.css"/>
  <style>
    /* ── Page layout ─────────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    /* ── Confetti ────────────────────────────────────────────── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Success card ────────────────────────────────────────── */
    .success-card {
      position: relative;
      z-index: 1;
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(30, 58, 95, 0.12);
      padding: 48px 40px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(28px) scale(0.97);
      transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .success-card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ── Animated tick icon ──────────────────────────────────── */
    .tick-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      position: relative;
    }

    .tick-bg {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.4);
      transition: opacity 0.35s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.35s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .success-card.visible .tick-bg {
      opacity: 1;
      transform: scale(1);
    }

    .tick-svg {
      width: 40px;
      height: 40px;
      overflow: visible;
    }

    .tick-path {
      stroke: white;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 55;
      stroke-dashoffset: 55;
      transition: stroke-dashoffset 0.38s 0.52s ease;
    }

    .success-card.visible .tick-path {
      stroke-dashoffset: 0;
    }

    /* Ripple ring */
    .tick-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2.5px solid rgba(37, 99, 235, 0.35);
      opacity: 0;
      transform: scale(0.85);
    }

    .success-card.visible .tick-ring {
      animation: ripple 0.9s 0.9s ease-out forwards;
    }

    @keyframes ripple {
      0%   { opacity: 1; transform: scale(0.85); }
      100% { opacity: 0; transform: scale(1.45); }
    }

    /* ── Text elements — staggered fade-up ───────────────────── */
    .s-title,
    .s-sub,
    .s-divider,
    .id-section,
    .next-box,
    .action-group {
      opacity: 0;
      transform: translateY(14px);
    }

    .success-card.visible .s-title     { animation: fadeUp 0.38s 0.70s ease forwards; }
    .success-card.visible .s-sub       { animation: fadeUp 0.38s 0.82s ease forwards; }
    .success-card.visible .s-divider   { animation: fadeUp 0.38s 0.90s ease forwards; }
    .success-card.visible .id-section  { animation: fadeUp 0.38s 0.98s ease forwards; }
    .success-card.visible .next-box    { animation: fadeUp 0.38s 1.08s ease forwards; }
    .success-card.visible .action-group{ animation: fadeUp 0.38s 1.18s ease forwards; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ──────────────────────────────────────────── */
    .s-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }

    .s-sub {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .s-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── Ma Foi ID badge ─────────────────────────────────────── */
    .id-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .id-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: white;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.1em;
      padding: 18px 24px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 20px rgba(37,99,235,0.28);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
      user-select: none;
    }

    .id-badge:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,99,235,0.36); }
    .id-badge:active { transform: translateY(0); }

    .copy-chip {
      background: rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .copy-tooltip {
      position: absolute;
      top: -36px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1e293b;
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
    }

    .copy-tooltip.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .copy-tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1e293b;
    }

    .id-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── What's next box ─────────────────────────────────────── */
    .next-box {
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 12px;
      padding: 16px 18px;
      text-align: left;
      margin-top: 20px;
    }

    .next-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .next-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .next-item:last-child { margin-bottom: 0; }

    .next-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Action buttons ──────────────────────────────────────── */
    .action-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(37,99,235,0.25);
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .btn-download:hover  { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(37,99,235,0.35); transform: translateY(-1px); }
    .btn-download:active { transform: translateY(0); }
    .btn-download:disabled { opacity: 0.7; cursor: wait; }

    .btn-row-2 {
      display: flex;
      gap: 10px;
    }

    .btn-primary-dl {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      font-size: 13.5px;
      font-weight: 700;
      font-family: inherit;
      border-radius: 10px;
      border: none;
      background: var(--primary, #0830a8);
      color: white;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-primary-dl:hover:not(:disabled) { opacity: 0.88; }
    .btn-primary-dl:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-sec {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px;
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-secondary);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .btn-sec:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #f0f4ff;
    }

    /* ── Spinner for PDF button ──────────────────────────────── */
    .spin {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spinAnim 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spinAnim { to { transform: rotate(360deg); } }

    /* ── Error state ─────────────────────────────────────────── */
    .err-state {
      text-align: center;
      padding: 20px;
    }

    .err-icon {
      width: 64px; height: 64px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      color: var(--danger);
    }

    .err-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .err-msg   { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .page-body     { padding: 20px 16px 40px; align-items: flex-start; padding-top: 32px; }
      .success-card  { padding: 28px 18px 24px; border-radius: 16px; }
      .tick-wrap     { width: 68px; height: 68px; margin-bottom: 18px; }
      .tick-bg       { width: 68px; height: 68px; }
      .tick-svg      { width: 34px; height: 34px; }
      .s-title       { font-size: 20px; }
      .s-sub         { font-size: 13px; }
      .id-badge      { font-size: 20px; padding: 14px 14px; border-radius: 12px; }
      .copy-chip     { font-size: 10px; padding: 3px 6px; }
      .id-hint       { font-size: 11px; }
      .next-box      { padding: 14px 14px; }
      .next-item     { font-size: 12.5px; gap: 8px; }
      .action-group  { margin-top: 18px; gap: 8px; }
      .btn-download  { padding: 12px 16px; font-size: 13.5px; }
      .btn-row-2     { flex-direction: column; gap: 8px; }
      .btn-sec       { padding: 11px 14px; font-size: 13px; }
      .err-state     { padding: 16px; }
    }

    @media (min-width: 481px) and (max-width: 640px) {
      .success-card  { padding: 36px 28px 32px; max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- Header — matches portal exactly -->
<header class="portal-header">
  <a href="index.html" class="portal-logo">
    <div class="portal-logo__icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div>
      <span class="portal-logo__name">Ma Foi</span>
      <span class="portal-logo__sub">Student Registration</span>
    </div>
  </a>
  <div class="portal-header__badge" id="header-badge" style="display:none"></div>
</header>

<!-- Confetti -->
<canvas id="confetti-canvas"></canvas>

<!-- Page body -->
<div class="page-body">
  <div class="success-card" id="card"></div>
</div>

<script type="module">
'use strict';

import { Confetti }  from './js/confetti.js';
import { supabase }  from './js/supabase.js';
import { VIEW_STUDENT_FULL, TABLE_REGISTRATION_DOCS } from './js/config.js';

const card  = document.getElementById('card');
const badge = document.getElementById('header-badge');

// Read every param, log everything
const search   = window.location.search;
const params   = new URLSearchParams(search);
const regType  = (params.get('type')  || '').trim();
const maFoiId  = (params.get('id')    || '').trim().toUpperCase() || null;
const fullName = (params.get('name')  || '').trim() || null;
const sid      = (params.get('sid')   || '').trim() || null;

console.log('SUCCESS PAGE PARAMS:');
console.log('  search string :', search);
console.log('  type  :', regType);
console.log('  id    :', maFoiId);
console.log('  name  :', fullName);
console.log('  sid   :', sid);

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s ?? '');
  return d.innerHTML;
}

function triggerCard() {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    card.classList.add('visible');
  }));
}

function showUpdateSuccess() {
  const isBajaj = regType === 'bajaj-update';
  badge.textContent = isBajaj ? 'Bajaj FinServ' : (maFoiId || 'Updated');
  badge.style.display = '';

  card.innerHTML = `
    <div class="tick-wrap">
      <div class="tick-bg" style="background:${isBajaj ? '#b45309' : '#0830a8'}">
        <svg class="tick-svg" viewBox="0 0 40 40">
          <path class="tick-path" d="M8 20 L17 29 L32 13"/>
        </svg>
      </div>
      <div class="tick-ring"></div>
    </div>
    <h1 class="s-title">Update Successful!</h1>
    <p class="s-sub">
      Your registration has been updated,
      <strong>${esc(fullName || 'Student')}</strong>.
      ${maFoiId ? '<br><b>Ma Foi ID: ' + esc(maFoiId) + '</b>' : ''}
    </p>
    <div class="s-divider"></div>
    <div class="action-group">
      <button id="btn-dl-pdf" class="btn-download">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Updated PDF
      </button>
      <a href="index.html" class="btn-sec">&#8592; Return to Home</a>
    </div>`;

  triggerCard();

  document.getElementById('btn-dl-pdf').addEventListener('click', async function() {
    this.textContent = 'Generating…';
    this.disabled = true;
    try {
      let student = null, docs = [];
      if (sid) {
        const { data } = await supabase.from(VIEW_STUDENT_FULL).select('*').eq('id', sid).single();
        student = data;
      } else if (maFoiId) {
        const { data } = await supabase.from(VIEW_STUDENT_FULL).select('*').eq('ma_foi_id', maFoiId).single();
        student = data;
      }
      if (student?.id) {
        const { data: d } = await supabase.from(TABLE_REGISTRATION_DOCS).select('*').eq('student_id', student.id);
        docs = d || [];
      }
      generatePDF(maFoiId, fullName, student, docs);
    } catch(e) { console.error(e); }
    this.textContent = 'Download Updated PDF';
    this.disabled = false;
  });
}

function showBajajSuccess() {
  badge.textContent = 'Bajaj FinServ';
  badge.style.display = '';
  card.innerHTML = `
    <div class="tick-wrap">
      <div class="tick-bg" style="background:#b45309">
        <svg class="tick-svg" viewBox="0 0 40 40">
          <path class="tick-path" d="M8 20 L17 29 L32 13"/>
        </svg>
      </div>
      <div class="tick-ring"></div>
    </div>
    <h1 class="s-title">Registration Successful!</h1>
    <p class="s-sub">Thank you, <strong>${esc(fullName || 'Student')}</strong>.<br>
    Your Bajaj FinServ registration has been submitted. Our team will contact you shortly.</p>
    <div class="s-divider"></div>
    <div class="action-group">
      <a href="index.html" class="btn-sec">&#8592; Return to Home</a>
    </div>`;
  triggerCard();
}

function showNasscomSuccess() {
  badge.textContent = maFoiId;
  badge.style.display = '';
  card.innerHTML = `
    <div class="tick-wrap">
      <div class="tick-bg" style="background:#0830a8">
        <svg class="tick-svg" viewBox="0 0 40 40">
          <path class="tick-path" d="M8 20 L17 29 L32 13"/>
        </svg>
      </div>
      <div class="tick-ring"></div>
    </div>
    <h1 class="s-title">Successfully Registered!</h1>
    <p class="s-sub">Welcome to Ma Foi Careers. Your registration is confirmed.</p>
    <div class="s-divider"></div>
    <div class="id-section">
      <p class="id-label">Your Ma Foi ID</p>
      <div class="id-badge">
        <span id="id-text">${esc(maFoiId)}</span>
      </div>
      <p class="id-hint">Save this ID — you need it to edit your registration.</p>
    </div>
    <div class="action-group">
      <button id="btn-dl-pdf" class="btn-download">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Registration PDF
      </button>
      <a href="index.html" class="btn-sec">&#8592; Return to Home</a>
    </div>`;
  triggerCard();

  document.getElementById('btn-dl-pdf').addEventListener('click', async function() {
    this.textContent = 'Generating…';
    this.disabled = true;
    try {
      const { data: student } = await supabase.from(VIEW_STUDENT_FULL).select('*').eq('ma_foi_id', maFoiId).single();
      let docs = [];
      if (student?.id) {
        const { data: d } = await supabase.from(TABLE_REGISTRATION_DOCS).select('*').eq('student_id', student.id);
        docs = d || [];
      }
      generatePDF(maFoiId, fullName, student, docs);
    } catch(e) { console.error(e); }
    this.textContent = 'Download Registration PDF';
    this.disabled = false;
  });

  // Confetti
  try {
    const confetti = new Confetti(document.getElementById('confetti-canvas'));
    confetti.launch();
    setTimeout(() => confetti.destroy(), 5000);
  } catch(e) {}
}

function showError() {
  card.innerHTML = `
    <div class="err-state">
      <div class="err-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div class="err-title">Something went wrong</div>
      <div class="err-msg">
        Could not load registration details.<br>
        DEBUG: type="${esc(regType)}" id="${esc(maFoiId||'')}" sid="${esc(sid||'')}"<br>
        URL: ${esc(search)}
      </div>
      <a href="index.html" class="btn-sec" style="display:inline-flex;max-width:240px;margin:16px auto 0">
        &#8592; Back to Home
      </a>
    </div>`;
  triggerCard();
}

// ── ROUTE ─────────────────────────────────────────────────────
if (regType === 'update' || regType === 'bajaj-update') {
  showUpdateSuccess();
} else if (regType === 'bajaj') {
  showBajajSuccess();
} else if (regType === 'new' && maFoiId) {
  showNasscomSuccess();
} else if (maFoiId) {
  // Any other type with a Ma Foi ID — show Nasscom success
  showNasscomSuccess();
} else {
  // Show error with debug info visible on screen
  showError();
}

// ── PDF GENERATOR ─────────────────────────────────────────────
function generatePDF(maFoiId, fullName, student, documents) {
  const today = new Date().toLocaleDateString('en-IN', {day:'2-digit',month:'long',year:'numeric'});
  const fmt = iso => { if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?iso:d.toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'}); };
  const mask = n => (n&&n.length===12)?'XXXX XXXX '+n.slice(8):(n||'—');
  const row = (k,v) => v!=null&&v!==''? `<tr><td class="lbl">${k}</td><td class="val">${esc(String(v))}</td></tr>` : '';
  const isBajaj = !maFoiId || student?.project_code === 'bajaj';

  const DOC_TYPES = [
    {key:'10th_marksheet',label:'10th Marksheet'},
    {key:'12th_marksheet',label:'12th Marksheet'},
    {key:'degree_certificate',label:'Degree Certificate'},
    {key:'aadhaar_card',label:'Aadhaar Card'},
    {key:'ews_certificate',label:'EWS Certificate'},
    {key:'signature',label:'Signature'},
    {key:'passport_photo',label:'Passport Photo'},
  ];

  const docRows = DOC_TYPES.map(dt => {
    const f = documents.find(d => d.doc_type === dt.key);
    return `<tr><td class="lbl">${dt.label}</td><td class="val ${f?'ok':'miss'}">${f?'✓ Uploaded':'— Not uploaded'}</td></tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Ma Foi Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;color:#1e293b;background:#fff;padding:32px 40px;font-size:13px;line-height:1.5}
.header{display:flex;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0830a8}
.org{font-size:18px;font-weight:800;color:#0830a8}.org-sub{font-size:11px;color:#64748b;margin-top:2px}
.meta{font-size:11px;color:#64748b;text-align:right;line-height:1.8}
.id-box{background:linear-gradient(135deg,#0830a8,#2563eb);color:white;border-radius:12px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.id-left{font-size:11px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.06em}
.id-num{font-size:24px;font-weight:900;letter-spacing:.1em}
.id-right{text-align:right;font-size:11px;opacity:.85;line-height:1.7}

table{width:100%;border-collapse:collapse}
tr:nth-child(even) td{background:#f8fafc}
td{padding:6px 10px;font-size:12.5px;vertical-align:top}
.lbl{width:44%;font-weight:600;color:#475569}.val{color:#1e293b}
.ok{color:#15803d;font-weight:600}.miss{color:#b91c1c}
.footer{margin-top:24px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:10.5px;color:#94a3b8;text-align:center}
</style></head><body>
<div class="header">
  <div><div class="org">Ma Foi Careers</div><div class="org-sub">Student Registration Acknowledgement</div></div>
  <div class="meta">Date: ${today}<br>Program: ${esc(student?.program_name||'—')} · ${esc(student?.location_name||'—')}</div>
</div>
${maFoiId ? `<div class="id-box"><div><div class="id-left">Ma Foi ID</div><div class="id-num">${esc(maFoiId)}</div></div><div class="id-right">Batch: ${esc(student?.batch_code||'Not assigned')}<br>${esc(student?.program_name||'')} · ${esc(student?.location_name||'')}</div></div>` : `<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#92400e"><b>Bajaj FinServ</b> — ${esc(student?.program_name||'')} · ${esc(student?.location_name||'')}</div>`}
<section><h2>Personal Information</h2><table>
${row('Full Name',student?.full_name||fullName)}${row('Email',student?.email)}${row('Phone',student?.phone)}
${row('Gender',student?.gender)}${row('Date of Birth',fmt(student?.date_of_birth))}
${row('Aadhaar',mask(student?.aadhaar_number))}${row('Address',student?.address)}
${!isBajaj?row('Qualification',student?.educational_qualification):''}
${!isBajaj?row('Graduation Year',student?.graduation_year):''}
</table></section>
<section><h2>Program Details</h2><table>
${row('Project',student?.project_name)}${row('Program',student?.program_name)}
${row('Location',student?.location_name)}${row('Batch',student?.batch_code||'Not assigned')}
</table></section>
<section><h2>Family Background</h2><table>
${row("Father's Name",student?.father_name)}${row("Mother's Name",student?.mother_name)}
${row("Father's Occupation",student?.father_occupation)}${row('Parent Contact',student?.parent_contact)}
${row('Family Members',student?.total_family_members)}${row('Annual Income',student?.annual_family_income)}
</table></section>
${!isBajaj?`<section><h2>Documents</h2><table>${docRows}</table></section>`:''}
<div class="footer">Computer-generated acknowledgement · Ma Foi Careers · CIEL HR Services · ${today}</div>
</body></html>`;
