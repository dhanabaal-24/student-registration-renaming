<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bajaj FinServ Registration &#8212; Ma Foi Careers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
.btn-bajaj{background:linear-gradient(135deg,#92400e,#b45309);color:white;padding:12px 24px;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:opacity .15s}
.btn-bajaj:hover:not(:disabled){opacity:.9}
.btn-bajaj:disabled{opacity:.6;cursor:not-allowed}
.step-item.is-active .step-dot,.step-item.is-done .step-dot{background:#b45309;border-color:#b45309}
.step-item.is-active .step-dot{box-shadow:0 0 0 4px rgba(180,83,9,.15)}
.step-item.is-active .step-label{color:#b45309}
.step-item.is-done:not(:last-child)::after{background:#b45309}
</style>
</head>
<body>
<header class="portal-header">
  <a href="index.html" class="portal-logo">
    <div class="portal-logo__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div><span class="portal-logo__name">Ma Foi</span><span class="portal-logo__sub">Student Registration</span></div>
  </a>
  <div class="portal-header__badge" style="background:rgba(180,83,9,.25);color:#fcd34d">Bajaj FinServ</div>
</header>

<main class="form-page">
  <div class="form-page__topbar">
    <button class="form-page__back" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Back
    </button>
    <div class="form-page__project">
      <div class="form-page__project-icon" style="background:linear-gradient(135deg,#92400e,#b45309)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
      </div>
      Bajaj FinServ &middot; Gold Loan &amp; Microfinance
    </div>
  </div>

  <div class="step-bar">
    <div class="step-bar__inner">
      <div class="step-item is-active" data-step="1"><div class="step-dot" id="dot-1">1</div><div class="step-label">Personal Details</div></div>
      <div class="step-item" data-step="2"><div class="step-dot" id="dot-2">2</div><div class="step-label">Family &amp; Contact</div></div>
      <div class="step-item" data-step="3"><div class="step-dot" id="dot-3">3</div><div class="step-label">Review &amp; Submit</div></div>
    </div>
  </div>

  <div class="form-page__body">

  <!-- STEP 1 -->
  <section id="bj-step-1">
    <div class="form-card">
      <div class="form-card__header">
        <div class="form-card__icon" style="background:#fff7ed;color:#b45309"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div><div class="form-card__title">Student Information</div><div class="form-card__subtitle">Personal and program details</div></div>
      </div>
      <div class="form-grid form-grid--2">
        <div class="ff" id="field-bj_first_name"><label class="ff__label">First Name <span class="ff__req">*</span></label><input class="ff__input" type="text" id="bj_first_name" placeholder="First name"><span class="ff__error" id="bj_first_name-err"></span></div>
        <div class="ff" id="field-bj_last_name"><label class="ff__label">Last Name <span class="ff__req">*</span></label><input class="ff__input" type="text" id="bj_last_name" placeholder="Last name"><span class="ff__error" id="bj_last_name-err"></span></div>
        <div class="ff" id="field-bj_email"><label class="ff__label">Email <span class="ff__req">*</span></label><input class="ff__input" type="email" id="bj_email" placeholder="you@example.com"><span class="ff__error" id="bj_email-err"></span></div>
        <div class="ff" id="field-bj_phone"><label class="ff__label">Phone <span class="ff__req">*</span></label><input class="ff__input" type="tel" id="bj_phone" placeholder="10-digit mobile" maxlength="10"><span class="ff__error" id="bj_phone-err"></span></div>
        <div class="ff" id="field-bj_gender"><label class="ff__label">Gender <span class="ff__req">*</span></label>
          <select class="ff__select" id="bj_gender"><option value="">Select gender</option><option>Male</option><option>Female</option><option>Other</option><option>Prefer not to say</option></select>
          <span class="ff__error" id="bj_gender-err"></span></div>
        <div class="ff" id="field-bj_dob"><label class="ff__label">Date of Birth <span class="ff__req">*</span></label><input class="ff__input" type="date" id="bj_dob"><span class="ff__error" id="bj_dob-err"></span></div>
        <div class="ff" id="field-bj_aadhaar"><label class="ff__label">Aadhaar <span class="ff__req">*</span></label><input class="ff__input" type="text" id="bj_aadhaar" placeholder="12 digits" maxlength="12"><span class="ff__error" id="bj_aadhaar-err"></span></div>
        <div class="ff" id="field-bj_alt_phone"><label class="ff__label">Alternate Phone</label><input class="ff__input" type="tel" id="bj_alt_phone" placeholder="Optional" maxlength="10"></div>
        <div class="ff" id="field-bj_course"><label class="ff__label">Course <span class="ff__req">*</span></label>
          <select class="ff__select" id="bj_course"><option value="">Select course</option><option value="Gold Loan">Gold Loan</option><option value="Microfinance">Microfinance</option></select>
          <span class="ff__error" id="bj_course-err"></span></div>
        <div class="ff" id="field-bj_location"><label class="ff__label">Location <span class="ff__req">*</span></label>
          <select class="ff__select" id="bj_location"><option value="">Select location</option><option>Chennai</option><option>Madurai</option><option>Bangalore</option><option>Kolkata</option></select>
          <span class="ff__error" id="bj_location-err"></span></div>
      </div>
      <div class="ff" id="field-bj_address"><label class="ff__label">Address <span class="ff__req">*</span></label><textarea class="ff__input" id="bj_address" rows="2" placeholder="Door no., Street, Area" style="resize:vertical"></textarea><span class="ff__error" id="bj_address-err"></span></div>
      <div class="form-grid form-grid--3">
        <div class="ff"><label class="ff__label">City</label><input class="ff__input" type="text" id="bj_city" placeholder="City"></div>
        <div class="ff"><label class="ff__label">State</label><input class="ff__input" type="text" id="bj_state" placeholder="State"></div>
        <div class="ff"><label class="ff__label">PIN Code</label><input class="ff__input" type="text" id="bj_pincode" placeholder="6-digit PIN" maxlength="6"></div>
      </div>
      <div class="btn-row"><span></span><button type="button" class="btn-bajaj" id="bj-btn-1-next">Next: Family Details <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button></div>
    </div>
  </section>

  <!-- STEP 2 -->
  <section id="bj-step-2" hidden>
    <div class="form-card">
      <div class="form-card__header">
        <div class="form-card__icon" style="background:#fff7ed;color:#b45309"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>
        <div><div class="form-card__title">Family Background</div><div class="form-card__subtitle">Family and income details</div></div>
      </div>
      <div class="form-grid form-grid--2">
        <div class="ff"><label class="ff__label">Father's Name</label><input class="ff__input" type="text" id="bj_father_name" placeholder="Father's full name"></div>
        <div class="ff"><label class="ff__label">Mother's Name</label><input class="ff__input" type="text" id="bj_mother_name" placeholder="Mother's full name"></div>
        <div class="ff"><label class="ff__label">Father's Occupation</label><input class="ff__input" type="text" id="bj_father_occ" placeholder="Occupation"></div>
        <div class="ff" id="field-bj_parent_contact"><label class="ff__label">Parent Contact</label><input class="ff__input" type="tel" id="bj_parent_contact" placeholder="10-digit number" maxlength="10"><span class="ff__error" id="bj_parent_contact-err"></span></div>
        <div class="ff" id="field-bj_family_members"><label class="ff__label">Total Family Members</label><input class="ff__input" type="number" id="bj_family_members" placeholder="e.g. 4" min="1" max="30"><span class="ff__error" id="bj_family_members-err"></span></div>
        <div class="ff"><label class="ff__label">Annual Family Income</label>
          <select class="ff__select" id="bj_family_income"><option value="">Select range</option><option>Below &#x20B9;1,00,000</option><option>&#x20B9;1,00,000 &#8211; &#x20B9;2,50,000</option><option>&#x20B9;2,50,000 &#8211; &#x20B9;5,00,000</option><option>&#x20B9;5,00,000 &#8211; &#x20B9;10,00,000</option><option>Above &#x20B9;10,00,000</option></select></div>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost" id="bj-btn-2-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Previous</button>
        <button type="button" class="btn-bajaj" id="bj-btn-2-next">Review &amp; Submit <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
  </section>

  <!-- STEP 3 -->
  <section id="bj-step-3" hidden>
    <div class="form-card">
      <div class="form-card__header">
        <div class="form-card__icon" style="background:#f0fdf4;color:#16a34a"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
        <div><div class="form-card__title">Review &amp; Submit</div><div class="form-card__subtitle">Verify all details before submitting</div></div>
      </div>
      <div id="bj-review"></div>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost" id="bj-btn-3-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Previous</button>
        <button type="button" class="btn-bajaj" id="bj-btn-submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Submit Registration
        </button>
      </div>
    </div>
  </section>

  </div>
</main>
<div id="toast-container" class="toast-container" aria-live="polite"></div>

<script type="module">
import { supabase } from './js/supabase.js';
import { toast }    from './js/toast.js';
import { TABLE_STUDENTS, PROJECT_BAJAJ } from './js/config.js';
import { validateName, validateEmail, validatePhone, validateAadhaar, validateDateOfBirth, validateSelect, validateAddress, validateFamilySection } from './js/validation.js';

const $ = id => document.getElementById(id);
const v = id => $(id)?.value?.trim()||'';
function setErr(id, msg){ const e=$('bj_'+id+'-err')||$(id+'-err'); if(e)e.textContent=msg||''; const w=$('field-bj_'+id)||$('field-'+id); if(w)w.classList.toggle('ff--error',!!msg); }
function clearErrs(){ document.querySelectorAll('.ff--error').forEach(e=>e.classList.remove('ff--error')); document.querySelectorAll('.ff__error').forEach(e=>e.textContent=''); }

let cur=1;
function showStep(n){
    for(let i=1;i<=3;i++){const s=$('bj-step-'+i);if(s)s.hidden=i!==n;}
    cur=n;
    document.querySelectorAll('.step-item').forEach((item,i)=>{
        const num=i+1,dot=item.querySelector('.step-dot');
        item.classList.toggle('is-active',num===n);
        item.classList.toggle('is-done',num<n);
        dot.innerHTML=num<n?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':String(num);
    });
    if(n===3)buildReview();
    window.scrollTo({top:0,behavior:'smooth'});
}
window.__bjStep=showStep;

function validateS1(){
    clearErrs(); let ok=true;
    [['first_name',validateName(v('bj_first_name'),'First name')],
     ['last_name', validateName(v('bj_last_name'),'Last name')],
     ['email',     validateEmail(v('bj_email'))],
     ['phone',     validatePhone(v('bj_phone'))],
     ['gender',    validateSelect(v('bj_gender'),'Gender')],
     ['dob',       validateDateOfBirth(v('bj_dob'))],
     ['aadhaar',   validateAadhaar(v('bj_aadhaar'))],
     ['course',    validateSelect(v('bj_course'),'Course')],
     ['location',  validateSelect(v('bj_location'),'Location')],
     ['address',   validateAddress(v('bj_address'))],
    ].forEach(([f,r])=>{if(!r.valid){setErr(f,r.message);ok=false;}});
    return ok;
}

function validateS2(){
    clearErrs();
    const errs=validateFamilySection({parent_contact:v('bj_parent_contact'),total_family_members:v('bj_family_members'),father_aadhaar_first3:'',father_aadhaar_last3:''});
    errs.forEach(({field,message})=>setErr(field,message));
    return errs.length===0;
}

function buildReview(){
    const esc=s=>{const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;};
    const row=(k,val)=>`<tr><th>${k}</th><td>${esc(val||'\u2014')}</td></tr>`;
    $('bj-review').innerHTML=
        `<div class="review-section"><div class="review-section__title">Personal Details <span class="review-edit" onclick="window.__bjStep(1)">Edit</span></div>
        <table class="review-table">
        ${row('Full Name',v('bj_first_name')+' '+v('bj_last_name'))}
        ${row('Email',v('bj_email'))}${row('Phone',v('bj_phone'))}
        ${row('Gender',v('bj_gender'))}${row('DOB',v('bj_dob'))}
        ${row('Aadhaar','XXXX XXXX '+v('bj_aadhaar').slice(-4))}
        ${row('Course',v('bj_course'))}${row('Location',v('bj_location'))}
        ${row('Address',v('bj_address'))}</table></div>
        <div class="review-section"><div class="review-section__title">Family Details <span class="review-edit" onclick="window.__bjStep(2)">Edit</span></div>
        <table class="review-table">
        ${row("Father's Name",v('bj_father_name'))}${row("Mother's Name",v('bj_mother_name'))}
        ${row("Father's Occupation",v('bj_father_occ'))}${row('Parent Contact',v('bj_parent_contact'))}
        ${row('Family Members',v('bj_family_members'))}${row('Income',v('bj_family_income'))}</table></div>`;
}

$('bj-btn-1-next').addEventListener('click',()=>{if(validateS1())showStep(2);else toast.error('Please fix the errors.');});
$('bj-btn-2-back').addEventListener('click',()=>showStep(1));
$('bj-btn-2-next').addEventListener('click',()=>{if(validateS2())showStep(3);else toast.error('Please fix the errors.');});
$('bj-btn-3-back').addEventListener('click',()=>showStep(2));

$('bj-btn-submit').addEventListener('click',async()=>{
    const btn=$('bj-btn-submit');
    btn.disabled=true; btn.textContent='Saving\u2026';
    try{
        const {data:proj,error:pE}=await supabase.from('projects').select('id').eq('code',PROJECT_BAJAJ).single();
        if(pE||!proj) throw new Error('Could not find Bajaj project: '+(pE?.message||'not found'));

        const {data:prog,error:prE}=await supabase.from('programs').select('id').eq('project_id',proj.id).eq('name',v('bj_course')).single();
        if(prE||!prog) throw new Error('Course not found: '+v('bj_course'));

        const {data:loc,error:lE}=await supabase.from('locations').select('id').eq('project_id',proj.id).eq('name',v('bj_location')).single();
        if(lE||!loc) throw new Error('Location not found: '+v('bj_location'));

        const fullName=v('bj_first_name')+' '+v('bj_last_name');
        const {data:stu,error:sE}=await supabase.from(TABLE_STUDENTS).insert([{
            project_id:proj.id, program_id:prog.id, location_id:loc.id,
            ma_foi_id:null,
            first_name:v('bj_first_name'), last_name:v('bj_last_name'), full_name:fullName,
            email:v('bj_email').toLowerCase(), phone:v('bj_phone'),
            alternate_phone:v('bj_alt_phone')||null,
            gender:v('bj_gender'), date_of_birth:v('bj_dob'), aadhaar_number:v('bj_aadhaar'),
            address:v('bj_address'), city:v('bj_city')||null, state:v('bj_state')||null, pincode:v('bj_pincode')||null,
            father_name:v('bj_father_name')||null, mother_name:v('bj_mother_name')||null,
            father_occupation:v('bj_father_occ')||null, parent_contact:v('bj_parent_contact')||null,
            total_family_members:v('bj_family_members')?parseInt(v('bj_family_members'),10):null,
            annual_family_income:v('bj_family_income')||null,
            registration_status:'registered', placement_status:'pending',
        }]).select('id').single();
        if(sE) throw new Error('Registration save failed: '+sE.message);

        try{sessionStorage.setItem('mafoi_reg',JSON.stringify({fullName,type:'bajaj'}));}catch(_){}
        // Show success in-page — no redirect
        showBajajSuccess(fullName);
    }catch(err){
        console.error('[Bajaj Submit]',err);
        toast.error(err.message||'Submission failed. Please try again.');
        btn.disabled=false; btn.textContent='Submit Registration';
    }
});

function showBajajSuccess(fullName) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#f4f5f7;display:flex;align-items:center;justify-content:center;padding:20px;z-index:999;overflow-y:auto;';
    overlay.innerHTML = `
        <div style="background:white;border:1px solid #e2e8f0;border-radius:20px;
                    box-shadow:0 8px 40px rgba(0,0,0,.12);padding:48px 40px 40px;
                    max-width:480px;width:100%;text-align:center;">
            <div style="width:80px;height:80px;border-radius:50%;background:#b45309;
                        display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h1 style="font-size:24px;font-weight:800;color:#0f172a;margin-bottom:10px;">
                Registration Successful!
            </h1>
            <p style="font-size:14px;color:#64748b;line-height:1.6;margin-bottom:24px;">
                Thank you, <strong>${fullName}</strong>.<br>
                Your Bajaj FinServ registration has been submitted successfully.<br>
                Our team will contact you shortly.
            </p>
            <div style="height:1px;background:#e2e8f0;margin-bottom:24px;"></div>
            <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;
                        padding:16px 18px;text-align:left;margin-bottom:24px;font-size:13px;color:#92400e;">
                <div style="font-weight:700;margin-bottom:8px;">What happens next?</div>
                <div style="margin-bottom:6px;">&#10003; A Ma Foi representative will contact you within 2–3 working days.</div>
                <div style="margin-bottom:6px;">&#10003; Keep your Aadhaar card and documents ready for verification.</div>
                <div>&#10003; You will be notified once assigned to a batch.</div>
            </div>
            <a href="index.html" style="display:flex;align-items:center;justify-content:center;
                padding:13px 20px;background:#b45309;color:white;border-radius:10px;
                font-size:14px;font-weight:700;text-decoration:none;">
                &#8592; Back to Home
            </a>
        </div>`;
    document.body.appendChild(overlay);
    window.scrollTo({ top: 0 });
}

showStep(1);
</script>
</body>
</html>
